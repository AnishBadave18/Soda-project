# Soda Checks for transactions_unclean.csv
checks for transactions:

  - row_count > 0:
      name: "Table must not be empty"

  - duplicate_count(product_code, customer_code, market_code, order_date) = 0:
      name: "No duplicate transactions"

  - missing_count(product_code) = 0:
      name: "product_code must not have missing values"

  - missing_count(customer_code) = 0:
      name: "customer_code must not have missing values"

  - missing_count(market_code) = 0:
      name: "market_code must not have missing values"

  - missing_count(order_date) = 0:
      name: "order_date must not have missing values"

  - missing_count(sales_qty) = 0:
      name: "sales_qty must not have missing values"

  - missing_count(sales_amount) = 0:
      name: "sales_amount must not have missing values"

  - missing_count(currency) = 0:
      name: "currency must not have missing values"

  - invalid_count(product_code) = 0:
      name: "product_code must match pattern ProdXXX"
      valid format: regex
      valid regex: 'Prod[0-9][0-9][0-9]$'

  - invalid_count(customer_code) = 0:
      name: "customer_code must match pattern CusXXX"
      valid format: regex
      valid regex: 'Cus[0-9][0-9][0-9]$'

  - invalid_count(market_code) = 0:
      name: "market_code must match pattern MarkXXX"
      valid format: regex
      valid regex: 'Mark[0-9][0-9][0-9]$'

  - invalid_count(currency) = 0:
      name: "currency must be INR or USD only"
      valid values:
        - INR
        - USD

  - min(sales_qty) >= 1:
      name: "sales_qty must be positive"

  - min(sales_amount) >= 0:
      name: "sales_amount must be non-negative"

  - max(sales_qty) <= 10000:
      name: "sales_qty must not exceed 10,000"

  - max(sales_amount) <= 10000000:
      name: "sales_amount must not exceed 10,000,000"
